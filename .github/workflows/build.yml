name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: izumi-linux-x64.tar.gz
          - os: windows-latest
            platform: windows
            artifact: izumi-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --no-group gui

      - name: Build with PyInstaller
        run: uv run pyinstaller izumi.spec -y

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: tar -czf ${{ matrix.artifact }} -C dist izumi

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path dist\izumi\* -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            izumi-linux-x64.tar.gz
            izumi-windows-x64.zip
